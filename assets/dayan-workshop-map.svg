<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Dayan AI Workshop Map</title>
  <desc id="desc">A five-surface map for reliable AI agent workflows: Context, Action, Control, Verification, and Handoff.</desc>
  <rect width="1200" height="520" fill="#F7F8FA"/>
  <rect x="60" y="54" width="1080" height="412" rx="18" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="90" y="110" fill="#1B365D" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800">Dayan AI Workshop</text>
  <text x="90" y="148" fill="#5F6B7C" font-family="Inter, Arial, sans-serif" font-size="18">Build AI work that can be replayed, checked, and trusted.</text>
  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(92 220)">
      <rect width="170" height="112" rx="14" fill="#F2F6FB" stroke="#E2E8F0"/>
      <text x="24" y="42" fill="#1B365D" font-size="22" font-weight="800">Context</text>
      <text x="24" y="74" fill="#5F6B7C" font-size="14">skills · docs</text>
    </g>
    <path d="M272 276 H342" stroke="#AD7B27" stroke-width="5" stroke-linecap="round"/>
    <g transform="translate(352 220)">
      <rect width="170" height="112" rx="14" fill="#F2F6FB" stroke="#E2E8F0"/>
      <text x="24" y="42" fill="#1B365D" font-size="22" font-weight="800">Action</text>
      <text x="24" y="74" fill="#5F6B7C" font-size="14">tools · APIs</text>
    </g>
    <path d="M532 276 H602" stroke="#AD7B27" stroke-width="5" stroke-linecap="round"/>
    <g transform="translate(612 220)">
      <rect width="170" height="112" rx="14" fill="#F2F6FB" stroke="#E2E8F0"/>
      <text x="24" y="42" fill="#1B365D" font-size="22" font-weight="800">Control</text>
      <text x="24" y="74" fill="#5F6B7C" font-size="14">redlines · gates</text>
    </g>
    <path d="M792 276 H862" stroke="#AD7B27" stroke-width="5" stroke-linecap="round"/>
    <g transform="translate(872 220)">
      <rect width="170" height="112" rx="14" fill="#F2F6FB" stroke="#E2E8F0"/>
      <text x="24" y="42" fill="#1B365D" font-size="22" font-weight="800">Verify</text>
      <text x="24" y="74" fill="#5F6B7C" font-size="14">tests · evidence</text>
    </g>
    <path d="M957 342 C957 392 750 402 613 392 C440 380 348 394 225 376" fill="none" stroke="#0F766E" stroke-width="5" stroke-linecap="round"/>
    <g transform="translate(92 358)">
      <rect width="170" height="62" rx="14" fill="#EAF0F8" stroke="#E2E8F0"/>
      <text x="24" y="39" fill="#1B365D" font-size="22" font-weight="800">Handoff</text>
    </g>
  </g>
  <text x="90" y="448" fill="#AD7B27" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" font-weight="700">Context -> Action -> Control -> Verification -> Handoff</text>
</svg>
